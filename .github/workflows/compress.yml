name: Compress Images
on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Add this missing step to install ImageMagick on the server
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Compress Images with ImageMagick
        run: |
          shopt -s globstar nullglob
          
          for img in images/**/*.{jpg,jpeg,png,JPG,JPEG,PNG}; do
            size=$(stat -c%s "$img")
            
            if [ "$size" -gt 512000 ]; then
              echo "Compressing $img..."
              mogrify -resize "1920x1920>" -define jpeg:extent=500kb "$img"
            fi
          done

      - name: Commit Compressed Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compress heavy images to 500KB"
